name: Contact Form Test

on:
  schedule:
    # 6:00 AM EST = 11:00 UTC
    - cron: "0 11 * * *"
    # 3:30 PM EST = 20:30 UTC
    - cron: "30 20 * * *"
  workflow_dispatch:

jobs:
  test-contact-form:
    runs-on: ubuntu-latest
    steps:
      - name: Send test contact form email
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/cron/contact-form-test")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          echo "Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ne 200 ]; then
            echo "::error::Contact form test failed with status $http_code"
            exit 1
          fi

          echo "$body" | jq -e '.success == true' > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "::error::Response did not indicate success"
            exit 1
          fi

          echo "Contact form test passed"
